<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

<body data-page="history">
  <div class="workspace-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <p class="eyebrow">Landlord Panel</p>
        <h2>Property Manager</h2>
        <span id="sidebarUser" class="sidebar-user">owner@local</span><div class="sidebar-actions"><button type="button" class="sidebar-logout" data-logout-button>Log out</button></div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="buildings.html">2. Buildings</a>

      </nav>

    <div class="page-shell wide-page-shell">
      <header class="hero compact-hero">
        <div>
          <p class="eyebrow">Tenant History</p>
          <h1>Permanent tenant records</h1>
          <p class="hero-copy">Keep every tenant’s details and every past stay, even after they vacate and move to another building later.</p>
        </div>
      </header>
      <main class="layout">
        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="section-label">Search</p>

            <div class="toolbar tenant-history-toolbar">
              <select id="tenantHistoryBuildingFilter" aria-label="Filter history by building">
                <option value="all">All buildings</option>
              </select>
              <input type="search" id="tenantHistorySearch" placeholder="Search name, Civil ID, phone, building">
