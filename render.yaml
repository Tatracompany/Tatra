services:
  - type: web
    name: tatra
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node scripts/serve.mjs
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_PATH
        value: /var/data/tatra.sqlite
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
    disk:
      name: tatra-data
      mountPath: /var/data
      sizeGB: 1
