databases:
  - name: tatra-db
    databaseName: tatra
    user: tatra
    plan: starter

services:
  - type: web
    name: tatra
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node scripts/serve.mjs
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: tatra-db
          property: connectionString
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
